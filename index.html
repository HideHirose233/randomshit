<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Monopoly ESP32 Dashboard</title>
    <style>
        /* --- IMPORT DIGITAL CLOCK FONT --- */
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        /* --- GLOBAL STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Arial', sans-serif; background-color: #ce1126; color: white; min-height: 100vh; }
        b, strong, h1, h2, h3, .amasis-font { font-family: 'Amasis MT Pro', 'Times New Roman', serif; font-weight: bold; }
        .hidden { display: none !important; }

        /* --- DASHBOARD PAGE --- */
        #dashboard-page { display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; }
        .monopoly-title { font-size: 3.5rem; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; border: 4px solid white; padding: 10px 20px; background-color: #ce1126; box-shadow: 4px 4px 0px rgba(0,0,0,0.3); }
        .dashboard-subtitle { font-size: 1.5rem; margin-top: 10px; margin-bottom: 15px; letter-spacing: 5px; text-transform: uppercase; }

        /* --- ROLE SELECTOR --- */
        .role-selector { background: white; color: black; padding: 15px; border-radius: 10px; border: 3px solid black; margin-bottom: 20px; box-shadow: 4px 4px 0 rgba(0,0,0,0.4); }
        .role-btn { padding: 10px 20px; margin: 5px; font-size: 1rem; border: 2px solid black; cursor: pointer; border-radius: 5px; background: #eee; font-weight: bold; }
        .role-btn.active { background: #ce1126; color: white; }

        /* --- STATUS BANNERS --- */
        .connect-btn { background-color: #000; color: #fff; border: 3px solid #fff; padding: 10px 25px; font-size: 1.2rem; border-radius: 10px; cursor: pointer; margin-bottom: 15px; box-shadow: 4px 4px 0 rgba(0,0,0,0.4); text-transform: uppercase; }
        .connect-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.4); }
        .status-container { margin-bottom: 25px; background: rgba(0, 0, 0, 0.2); padding: 10px 25px; border-radius: 20px; font-size: 1rem; border: 2px solid rgba(255, 255, 255, 0.5); font-family: 'Arial', sans-serif; transition: all 0.3s ease; }
        .status-disconnected { color: #ff3333; text-shadow: 0 0 5px #ff3333; }
        .status-connected { color: #32cd32; text-shadow: 0 0 5px #32cd32; }
        .status-cloud { color: #00bfff; text-shadow: 0 0 5px #00bfff; } 

        /* --- DASHBOARD PLAYERS LIST --- */
        #dashboard-players { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; margin-bottom: 30px; }
        .dashboard-player-card { background-color: #f4f0ec; color: black; border: 3px solid black; border-radius: 10px; padding: 15px 10px; text-align: center; box-shadow: 4px 4px 0px rgba(0,0,0,0.3); }
        .dashboard-player-name { font-size: 1.1rem; margin-bottom: 5px; text-transform: uppercase; }
        .dashboard-player-balance { color: #2e8b57; font-size: 1.4rem; }
        .dashboard-player-time { font-family: 'Share Tech Mono', monospace; font-size: 1.2rem; color: #ff3333; background-color: #111; border: 2px solid #000; border-radius: 5px; padding: 3px 12px; display: inline-block; margin-top: 8px; box-shadow: inset 0px 0px 6px rgba(0,0,0,0.8); letter-spacing: 2px; text-shadow: 0 0 4px rgba(255, 51, 51, 0.5); }

        /* --- MENU BUTTONS --- */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 500px; }
        .menu-btn { background-color: #f4f0ec; color: #ce1126; border: 4px solid black; border-radius: 15px; aspect-ratio: 1 / 1; font-size: 1.2rem; cursor: pointer; box-shadow: 0 6px 0px black; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.1s, box-shadow 0.1s; }
        .menu-btn:first-child { grid-column: span 2; aspect-ratio: auto; padding: 30px; }
        .menu-btn:active { transform: translateY(6px); box-shadow: 0 0px 0px black; }
        .menu-icon { font-size: 3rem; margin-bottom: 10px; }

        /* --- LIVE DATA LOG (FOR DEBUGGING) --- */
        #debugLog { width: 100%; max-width: 500px; background: #111; color: #0f0; font-family: monospace; font-size: 0.8rem; padding: 10px; border-radius: 5px; margin-top: 20px; white-space: pre-wrap; word-wrap: break-word; text-align: left; max-height: 120px; overflow-y: auto; border: 2px solid #555; }

        /* --- SUB-PAGES GENERAL STYLES --- */
        .page { padding: 20px; background-color: #e8e4d9; color: black; min-height: 100vh; }
        .header-bar { display: flex; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .back-btn { background-color: #ce1126; color: white; border: 2px solid black; padding: 10px 20px; font-size: 1rem; border-radius: 5px; cursor: pointer; box-shadow: 2px 2px 0 black; }
        .back-btn:active { transform: translate(2px, 2px); box-shadow: 0 0 0 black; }
        .page-title { font-size: 1.8rem; text-transform: uppercase; flex-grow: 1; }
        .view-toggles { display: flex; gap: 10px; }
        .toggle-btn { background-color: #ccc; color: #333; border: 2px solid #000; padding: 8px 12px; font-family: 'Arial', sans-serif; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .toggle-btn.active { background-color: #2e8b57; color: white; }

        /* --- PROPERTIES (CARDS & LAYOUTS) --- */
        .property-card { background-color: #f4f0ec; border: 2px solid black; display: flex; flex-direction: column; text-align: center; box-shadow: 3px 3px 8px rgba(0,0,0,0.2); font-size: 0.8rem; min-height: 320px; }
        .card-header { border: 2px solid black; margin: 4px; padding: 10px 2px; text-transform: uppercase; min-height: 60px; display: flex; flex-direction: column; justify-content: center; }
        .card-header h3 { font-size: 0.8rem; margin: 0; }
        .card-body { padding: 8px; display: flex; flex-direction: column; gap: 3px; flex-grow: 1; }
        .rent-row { display: flex; justify-content: space-between; padding: 2px 4px; }
        .rent-row.highlight { border: 2px solid #ffcc00; background-color: rgba(255, 204, 0, 0.4); border-radius: 3px; }
        .rent-row.highlight b { color: black; }
        .card-footer { margin-top: auto; border-top: 1px solid #ccc; padding-top: 5px; font-size: 0.75rem; display: flex; flex-direction: column; gap: 3px; padding-bottom: 5px; }
        .owner-banner { padding: 8px; font-size: 0.9rem; text-transform: uppercase; border-top: 2px solid black; }
        .owner-bank { background-color: #e0e0e0; color: #555; }
        .owner-p1 { background-color: #cce5ff; color: #004085; }
        .owner-p2 { background-color: #d4edda; color: #155724; }
        .owner-p3 { background-color: #fff3cd; color: #856404; }
        .owner-p4 { background-color: #f8d7da; color: #721c24; }

        #properties-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 768px) { #properties-grid { grid-template-columns: repeat(4, 1fr); } }

        #properties-scroll { width: 100%; max-width: 1200px; margin: 0 auto; }
        .owner-section { margin-bottom: 30px; background-color: #f4f0ec; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 2px solid #000; }
        .owner-title { font-size: 1.5rem; margin-bottom: 15px; text-transform: uppercase; border-bottom: 3px solid #ce1126; padding-bottom: 5px; display: inline-block; }

        .horizontal-scroll-container::-webkit-scrollbar { display: none; }
        .grid-page { display: grid; grid-template-columns: repeat(2, 150px); grid-template-rows: repeat(2, auto); justify-content: center; gap: 10px; min-width: 100%; flex-shrink: 0; scroll-snap-align: center; }

        let isHost = true; 

        function logDebug(message) {
            const logger = document.getElementById('debugLog');
            logger.innerText = "⏳ " + new Date().toLocaleTimeString() + "\n" + message;
        }

        function setRole(role) {
            const btnHost = document.getElementById('role-host');
            const btnPlayer = document.getElementById('role-player');
            const bleBtn = document.getElementById('bleConnectBtn');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');

            if (role === 'host') {
                isHost = true;
                btnHost.classList.add('active');
                btnPlayer.classList.remove('active');
                bleBtn.classList.remove('hidden'); 
                statusDot.className = 'status-dot status-disconnected';
                statusText.innerText = 'Disconnected (Waiting for ESP32)';
                logDebug("Switched to Host Mode. Click Connect ESP32.");
            } else {
                isHost = false;
                btnHost.classList.remove('active');
                btnPlayer.classList.add('active');
                bleBtn.classList.add('hidden'); 
                
                statusDot.className = 'status-dot status-cloud';
                statusText.innerText = 'Syncing from Cloud...';
                logDebug("Switched to Player Mode. Waiting for Cloud Data...");
                startCloudListener();
            }
        }

        function uploadToCloud(jsonData) {
            if (!isHost || !window.firebaseDB) return;
            const dbRef = window.firebaseRef(window.firebaseDB, 'monopoly/gamestate');
            window.firebaseSet(dbRef, JSON.parse(jsonData)).catch(e => console.error("Cloud Upload Failed:", e));
        }

        let isListening = false;
        function startCloudListener() {
            if (isListening || !window.firebaseDB) return;
            isListening = true;
            
            const dbRef = window.firebaseRef(window.firebaseDB, 'monopoly/gamestate');
            window.firebaseOnValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                if (data && !isHost) {
                    parseIncomingData(JSON.stringify(data)); 
                    document.getElementById('statusText').innerText = 'Synced with Cloud ✅';
                }
            });

        // ==========================================
        // WEB BLUETOOTH (HOST ONLY) w/ MTU BYPASS
        // ==========================================
        const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
        const CHARACTERISTIC_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214";
        let myBleDevice, myBleCharacteristic;

        document.getElementById('bleConnectBtn').addEventListener('click', async () => {
            if(!isHost) return;

            try {
                document.getElementById('statusText').innerText = "Searching...";
                logDebug("Asking Windows for permission to scan...");

                if (myBleDevice && myBleDevice.gatt && !myBleDevice.gatt.connected) {
                    logDebug('Reconnecting to previously paired device...');
                    await executeBLEConnection();
                    return;
                }

                myBleDevice = await navigator.bluetooth.requestDevice({ 
                    acceptAllDevices: true, 
                    optionalServices: [SERVICE_UUID] 
                });
                
                myBleDevice.addEventListener('gattserverdisconnected', onDisconnected);
                await executeBLEConnection();

            } catch (error) {
                console.error("BLE Error:", error);
                document.getElementById('statusText').innerText = "Connection Failed";
                logDebug("Error: " + error.message);
            }
        });

        // The Forceful "Long Read" Function to Bypass MTU Truncation
        async function fetchFullDataFromESP32() {
            try {
                logDebug("Forcing Long Read from ESP32 Memory...");
                const value = await myBleCharacteristic.readValue();
                const decoder = new TextDecoder('utf-8');
                const rawJson = decoder.decode(value).replace(/\0/g, '').trim();
                
                if (rawJson.startsWith('{') && rawJson.endsWith('}')) {
                    logDebug("✅ SUCCESS! Full Data Downloaded:\n" + rawJson);
                    parseIncomingData(rawJson); 
                    uploadToCloud(rawJson);     
                } else if (rawJson.length > 0) {
                    logDebug("⚠️ WARNING: Data is corrupted/cut off:\n" + rawJson);
                } else {
                    logDebug("ℹ️ Data is completely empty. Waiting for ESP32 to save a game state...");
                }
            } catch (error) {
                logDebug("❌ Read failed. " + error.message);
            }
        }

        async function executeBLEConnection() {
            document.getElementById('statusText').innerText = "Connecting to Server...";
            const server = await myBleDevice.gatt.connect();
            
            await new Promise(resolve => setTimeout(resolve, 500));

            document.getElementById('statusText').innerText = "Getting Services...";
            const service = await server.getPrimaryService(SERVICE_UUID);
            myBleCharacteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

            document.getElementById('statusText').innerText = "Syncing Data...";

            // 1. Force the first read
            await fetchFullDataFromESP32();

            // 2. Listen for "Pings" from the ESP32 to force new reads
            await myBleCharacteristic.startNotifications();
            
            let isReading = false;
            myBleCharacteristic.addEventListener('characteristicvaluechanged', async (event) => {
                logDebug("🔔 Ping received from ESP32! Data changed.");
                if(isReading) return;
                isReading = true;
                await fetchFullDataFromESP32();
                isReading = false;
            });

            // Update UI
            document.getElementById('statusDot').className = 'status-dot status-connected';
            document.getElementById('statusText').innerText = "Connected to ESP32";
            document.getElementById('bleConnectBtn').innerText = "ESP32 Synced";
        }

        function onDisconnected() {
            if(!isHost) return;
            document.getElementById('statusDot').className = 'status-dot status-disconnected';
            document.getElementById('statusText').innerText = "Disconnected. Click to Reconnect.";
            document.getElementById('bleConnectBtn').innerText = "Reconnect ESP32";
            logDebug("❌ Bluetooth Disconnected!");
        }

        // ==========================================
        // DUAL-FORMAT PARSER & UI RENDERERS
        // ==========================================
        function parseIncomingData(jsonString) {
            try {
                const esp32Data = JSON.parse(jsonString);
                
                // This adapts whether your Arduino says "bal" OR "players"!
                if(esp32Data.bal) {
                    esp32Data.bal.forEach((balance, index) => {
                        if(playersDatabase[index]) playersDatabase[index].balance = balance;
                    });
                } else if(esp32Data.players) {
                    esp32Data.players.forEach((balance, index) => {
                        if(playersDatabase[index]) playersDatabase[index].balance = balance;
                    });
                }
                
                // This adapts whether your Arduino says "own/hs" OR "p"!
                if(esp32Data.own && esp32Data.hs) {
                    esp32Data.own.forEach((ownerId, index) => {
                        if(propertiesDatabase[index]) {
                            propertiesDatabase[index].ownerIndex = ownerId;        
                            propertiesDatabase[index].housesOwned = esp32Data.hs[index]; 
                        }
                    });
                } else if (esp32Data.p) {
                    esp32Data.p.forEach((propArray, index) => {
                        if (propertiesDatabase[index] && propArray.length >= 2) {
                            propertiesDatabase[index].ownerIndex = propArray[0];
                            propertiesDatabase[index].housesOwned = propArray[1];
                        }
                    });
                }
                
                renderDashboardPlayers();
                renderProperties();
            } catch(e) {
                console.error("Failed parsing JSON:", e);
                logDebug("❌ Failed to parse JSON to UI: " + e.message);
            }
        }

        function getOwnerDetails(index) {
            if (index === 0) return { name: "Player 1", css: "owner-p1" };
            if (index === 1) return { name: "Player 2", css: "owner-p2" };
            if (index === 2) return { name: "Player 3", css: "owner-p3" };
            if (index === 3) return { name: "Player 4", css: "owner-p4" };
            return { name: "Bank", css: "owner-bank" };
        }

        function renderDashboardPlayers() {
            const container = document.getElementById('dashboard-players');
            container.innerHTML = '';
            playersDatabase.forEach(player => {
                const playerCard = `
                    <div class="dashboard-player-card">
                        <div class="dashboard-player-name amasis-font">${player.name}</div>
                        <div class="dashboard-player-balance amasis-font">
                            $${player.balance}
                            <div>
                                <div class="dashboard-player-time">${player.time}</div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += playerCard;
            });
        }

        function createCardHTML(prop) {
            const mortgageValue = Math.floor(prop.price / 2);
            const unmortgageValue = mortgageValue + Math.floor((mortgageValue + 9) / 10);
            const owner = getOwnerDetails(prop.ownerIndex);
            const isDarkHeader = ["#00008B", "#8B4513", "#008000", "#333"].includes(prop.color);
            const textColor = isDarkHeader ? 'white' : 'black';

            let innerBodyHTML = '';

            if (prop.type === "street") {
                const hlRent = prop.housesOwned === 0 ? 'highlight' : '';
                const hlH1 = prop.housesOwned === 1 ? 'highlight' : '';
                const hlH2 = prop.housesOwned === 2 ? 'highlight' : '';
                const hlH3 = prop.housesOwned === 3 ? 'highlight' : '';
                const hlH4 = prop.housesOwned === 4 ? 'highlight' : '';
                const hlHotel = prop.housesOwned === 5 ? 'highlight' : '';

                innerBodyHTML = `
                    <div class="rent-row ${hlRent}"><span>Rent</span> <b>$${prop.r0}</b></div>
                    <div class="rent-row ${hlH1}"><span>With 1 House</span> <b>$${prop.r1}</b></div>
                    <div class="rent-row ${hlH2}"><span>With 2 Houses</span> <b>$${prop.r2}</b></div>
                    <div class="rent-row ${hlH3}"><span>With 3 Houses</span> <b>$${prop.r3}</b></div>
                    <div class="rent-row ${hlH4}"><span>With 4 Houses</span> <b>$${prop.r4}</b></div>
                    <div class="rent-row ${hlHotel}"><span>With HOTEL</span> <b>$${prop.r5}</b></div>
                    <div class="card-footer">
                        <div>Mortg. $${mortgageValue} / Unmortg. $${unmortgageValue}</div>
                        <div>Houses $${prop.houseCost} each</div>
                    </div>
                `;
            } else if (prop.type === "station") {
                innerBodyHTML = `
                    <br>
                    <div class="rent-row"><span>Rent</span> <b>$25</b></div>
                    <div class="rent-row"><span>2 stations</span> <b>$50</b></div>
                    <div class="rent-row"><span>3 stations</span> <b>$100</b></div>
                    <div class="rent-row"><span>4 stations</span> <b>$200</b></div>
                    <div class="card-footer">
                        <div>Mortg. $${mortgageValue} / Unmortg. $${unmortgageValue}</div>
                    </div>
                `;
            } else if (prop.type === "utility") {
                let utilityIcon = '';
                if (prop.name === "ELECTRIC COMPANY") {
                    utilityIcon = `<div style="margin: 10px 0; text-align: center;"><svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"></path><path d="M10 22h4"></path><path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1.5.5 2.5 1.5 3.5.76.76 1.23 1.52 1.41 2.5"></path></svg></div>`;
                } else if (prop.name === "WATER WORKS") {
                    utilityIcon = `<div style="margin: 10px 0; text-align: center;"><svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8h12a2 2 0 0 1 2 2v2"></path><path d="M12 8V5h3"></path><path d="M19 15v3a1 1 0 0 1-1 1h-2a1 1 0 0 1-1-1v-3"></path><path d="M17 22v.01"></path></svg></div>`;
                }
                innerBodyHTML = `
                    ${utilityIcon}
                    <div style="padding: 10px; text-align: left; flex-grow: 1;">
                        1 Utility = <b>4x</b> dice roll.<br><br>
                        2 Utilities = <b>10x</b> dice roll.
                    </div>
                    <div class="card-footer">
                        <div>Mortg. $${mortgageValue} / Unmortg. $${unmortgageValue}</div>
                    </div>
                `;
            }

            return `
                <div class="property-card">
                    <div class="card-header" style="background-color: ${prop.color}; color: ${textColor}; border-bottom: ${prop.type === 'utility' ? '2px solid black' : 'none'};">
                        ${prop.type === 'street' ? '<span class="amasis-font" style="font-size: 0.6rem;">TITLE DEED</span>' : ''}
                        <h3 class="amasis-font">${prop.name}</h3>
                    </div>
                    <div class="card-body">
                        ${innerBodyHTML}
                    </div>
                    <div class="owner-banner amasis-font ${owner.css}">
                        OWNER: ${owner.name}
                    </div>
                </div>
            `;
        }

        function chunkArray(array, size) {
            const result = [];
            for (let i = 0; i < array.length; i += size) result.push(array.slice(i, i + size));
            return result;
        }

        function renderProperties() {
            const grid = document.getElementById('properties-grid');
            grid.innerHTML = '';
            propertiesDatabase.forEach(prop => { grid.innerHTML += createCardHTML(prop); });

            const scrollContainer = document.getElementById('properties-scroll');
            scrollContainer.innerHTML = '';

            const groups = { "-1": { title: "The Bank", props: [] }, "0": { title: "Player 1", props: [] }, "1": { title: "Player 2", props: [] }, "2": { title: "Player 3", props: [] }, "3": { title: "Player 4", props: [] } };

            propertiesDatabase.forEach(prop => {
                if (groups[prop.ownerIndex]) groups[prop.ownerIndex].props.push(prop);
            });

            Object.keys(groups).sort().forEach(ownerId => {
                const group = groups[ownerId];
                if (group.props.length === 0) return; 

                const chunks = chunkArray(group.props, 4);
                let pagesHTML = '';
                chunks.forEach(chunk => {
                    let cardsHTML = '';
                    chunk.forEach(prop => { cardsHTML += createCardHTML(prop); });
                    pagesHTML += `<div class="grid-page">${cardsHTML}</div>`;
                });

                const sectionHTML = `
                    <div class="owner-section">
                        <h3 class="owner-title amasis-font">${group.title}</h3>
                        <div class="horizontal-scroll-container">
                            ${pagesHTML}
                        </div>
                    </div>
                `;
                scrollContainer.innerHTML += sectionHTML;
            });
        }

        window.onload = () => {
            renderProperties();
            renderDashboardPlayers();
        };
    </script>
</body>
</html>
